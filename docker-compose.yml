version: "3.9"

services:
  # Laravel PHP-FPM backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finals_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - finals_network

  # Nginx web server for Laravel
  web:
    image: nginx:alpine
    container_name: finals_web
    ports:
      - "8000:80"  # Laravel app
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - finals_network

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: finals_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Finals
      MYSQL_USER: mike
      MYSQL_PASSWORD: mike
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - finals_network

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: Finals_phpmyadmin
    ports:
      - "8080:80"  # phpMyAdmin GUI
    environment:
      PMA_HOST: mysql
      PMA_USER: mike
      PMA_PASSWORD: mike
    depends_on:
      - mysql
    networks:
      - finals_network

# Persistent MySQL volume
volumes:
  mysql_data:

# Docker network for internal communication
networks:
  finals_network:
    driver: bridge
